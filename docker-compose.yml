services:
  bot:
    build: .
    container_name: projeto-bot-games
    restart: unless-stopped
    tty: true
    stdin_open: true
    dns:
      - 8.8.8.8
      - 8.8.4.4

    # Variáveis de ambiente (do arquivo .env)
    env_file:
      - .env

    # Usa diretório de dados para evitar "Is a directory" quando arquivos não existem no host
    environment:
      - DATA_DIR=/app/data

    # Volumes: um único diretório (o entrypoint cria config/state/history/sources se não existirem)
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs

    # Configuração de logs
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

    # Política de restart
    # unless-stopped: reinicia sempre, exceto se parado manualmente

    # Healthcheck (herda do Dockerfile)

    # Labels para organização
    labels:
      com.projeto-bot-games.description: "GameBot"
      com.projeto-bot-games.version: "2.1"
